name: Daily Auto-Commit

on:
  schedule:
    # Run daily at 9:00 AM Africa/Nairobi Time (UTC+3)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.PAT_TOKEN }}
        
    - name: Configure Git
      run: |
        git config --global user.name "Auto-Commit Bot"
        git config --global user.email "bot@auto-commit.com"
        
    - name: Create daily update
      run: |
        # Always create a daily update to maintain streak
        echo "🤖 Daily auto-commit - $(date +'%Y-%m-%d %H:%M')" > daily_update.md
        echo "This file maintains GitHub contribution streak." >> daily_update.md
        echo "Last updated: $(date)" >> daily_update.md
        echo "Repository: CampoPawa" >> daily_update.md
        
    - name: Commit and push changes
      run: |
        git add daily_update.md
        
        # Get today's date for commit message
        COMMIT_MSG="🤖 Daily auto-commit - $(date +'%Y-%m-%d %H:%M')"
        
        git commit -m "$COMMIT_MSG"
        git push origin master
