app = "campo-jira-2026"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_SETTINGS_MODULE = "config.settings"
  PORT = "8000"
  ALLOWED_HOSTS = "127.0.0.1,localhost,campo-09gm.onrender.com,campo-jira-2026.fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://campo-09gm.onrender.com,https://campo-jira-2026.fly.dev"
  # Free tier optimization settings
  PYTHONUNBUFFERED = "1"

[deploy]
  release_command = "python manage.py migrate"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

# Free tier machine size optimization
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
