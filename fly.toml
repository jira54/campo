app = "campo"

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_SETTINGS_MODULE = "config.settings"
  PORT = "8000"
  ALLOWED_HOSTS = "127.0.0.1,localhost,campo-09gm.onrender.com,campo.fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://campo-09gm.onrender.com,https://campo.fly.dev"

[deploy]
  release_command = "sh -c 'python fix_deploy_migration.py && python manage.py migrate --fake-initial'"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
