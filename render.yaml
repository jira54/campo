services:
  - type: web
    name: campopawa-web
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn config.wsgi --log-file -"
    envVars:
      - key: DATABASE_URL
        value: $DATABASE_URL
      - key: SECRET_KEY
        value: $SECRET_KEY
