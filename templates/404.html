{% extends 'base.html' %}

{% block title %}Page Not Found - CampoPawa Boutique{% endblock %}

{% block content %}
<div class="min-h-screen bg-deep flex items-center justify-center p-6 font-outfit text-center">
    <div class="w-full max-w-2xl">
        <div class="relative inline-block mb-12">
            <h1 class="text-[180px] md:text-[240px] font-black leading-none text-white/5 select-none">404</h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-32 h-32 md:w-48 md:h-48 rounded-3xl bg-brand/10 border border-brand/20 backdrop-blur-2xl flex items-center justify-center text-brand text-6xl md:text-8xl shadow-2xl animate-pulse">
                    <svg class="w-20 h-20 md:w-32 md:h-32" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
            </div>
        </div>

        <h2 class="text-white text-4xl md:text-5xl font-black tracking-tight mb-6 mt-8">You've drifted <span class="text-brand">off course</span>.</h2>
        <p class="text-stone-400 text-xl font-medium mb-12 max-w-lg mx-auto">The floor you are looking for has been moved or was never constructed. Allow us to lead you back to safety.</p>

        <div class="flex flex-col md:flex-row items-center justify-center gap-6">
            <a href="{% url 'vendors:root_redirect' %}" class="w-full md:w-auto bg-brand text-deep font-black px-12 py-5 rounded-2xl shadow-brand hover:scale-[1.02] active:scale-[0.98] transition-all text-xl">
                Return to Concierge
            </a>
            <a href="javascript:history.back()" class="w-full md:w-auto bg-white/5 text-stone-300 font-bold px-12 py-5 rounded-2xl border border-white/5 hover:bg-white/10 transition-all text-xl">
                Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
