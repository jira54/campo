<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CampoPawa{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep': '#07111E',
                        'navy': '#0C2340',
                        'teal': '#0D9488',
                        'sea': '#14B8A6',
                        'gold': '#F59E0B',
                    }
                }
            }
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-deep text-gray-100">

    {% if messages %}
        <div class="fixed top-4 right-4 z-50 space-y-2 max-w-sm">
            {% for message in messages %}
                <div class="px-4 py-3 rounded-xl text-sm font-medium shadow-xl border flex items-start gap-3
                    {% if 'error' in message.tags %}bg-red-950 border-red-500/40 text-red-200
                    {% elif 'warning' in message.tags %}bg-yellow-950 border-yellow-500/40 text-yellow-200
                    {% else %}bg-navy border-gold/40 text-white{% endif %}">
                    <span class="flex-1">{{ message }}</span>
                    <button onclick="this.parentElement.remove()" 
                            class="opacity-50 hover:opacity-100 text-lg leading-none mt-0.5">×</button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
    {% block extra_js %}{% endblock %}

</body>
</html>
