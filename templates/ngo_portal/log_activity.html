{% extends 'base.html' %}

{% block title %}Share the Care - CampoPawa NGO{% endblock %}

{% block content %}
<div class="flex min-h-screen bg-deep overflow-hidden font-outfit">
    {% include 'ngo_portal/sidebar_ngo.html' %}

    <div class="flex-1 h-screen overflow-y-auto overflow-x-hidden relative">
        <div class="p-6 md:p-10 pt-24 md:pt-32 pb-24 max-w-2xl mx-auto">
            
            <div class="mb-10 text-center">
                <h1 class="text-4xl font-black text-white mb-2 leading-tight tracking-tighter">Share the <span class="text-emerald-400">Care</span>.</h1>
                <p class="text-stone-400 text-sm">Every activity logged tells a story of impact and shared progress.</p>
            </div>

            <div class="bg-stone-900/60 border border-white/10 rounded-3xl p-8 backdrop-blur-md shadow-2xl">
                <form method="POST" class="space-y-6">
                    {% csrf_token %}
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-stone-500 uppercase tracking-widest ml-1">Select Program (Mission)</label>
                        <select name="program_id" required class="w-full bg-black/40 border border-white/5 rounded-xl px-6 py-4 text-white focus:border-brand/50 transition-all outline-none appearance-none">
                            <option value="">Which mission is this for?</option>
                            {% for prog in programs %}
                                <option value="{{ prog.id }}">{{ prog.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-stone-500 uppercase tracking-widest ml-1">Select Loved One (Beneficiary)</label>
                        <select name="beneficiary_id" required class="w-full bg-black/40 border border-white/5 rounded-xl px-6 py-4 text-white focus:border-brand/50 transition-all outline-none appearance-none">
                            <option value="">Who received this care?</option>
                            {% for ben in beneficiaries %}
                                <option value="{{ ben.id }}">{{ ben.name }} ({{ ben.unique_system_id }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-stone-500 uppercase tracking-widest ml-1">Activity Type</label>
                        <input type="text" name="activity_type" required placeholder="e.g. Health Screening, Seed Distribution..." 
                               class="w-full bg-black/40 border border-white/5 rounded-xl px-6 py-4 text-white focus:border-brand/50 transition-all outline-none">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-stone-500 uppercase tracking-widest ml-1">Field Notes (The Growth Story)</label>
                        <textarea name="notes" rows="4" placeholder="Briefly share the story of this interaction..." 
                                  class="w-full bg-black/40 border border-white/5 rounded-xl px-6 py-4 text-white focus:border-brand/50 transition-all outline-none resize-none"></textarea>
                    </div>

                    <div class="pt-6">
                        <button type="submit" class="w-full bg-emerald-500 text-deep font-black py-5 rounded-2xl shadow-lg shadow-emerald-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            Record Impact
                        </button>
                        <a href="{% url 'ngo_portal:dashboard' %}" class="block text-center mt-6 text-[10px] font-black text-stone-600 uppercase tracking-widest hover:text-white transition-all">Cancel and Return</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
