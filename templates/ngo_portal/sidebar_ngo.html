<!-- Mobile Top Bar -->
<div class="md:hidden fixed top-0 left-0 right-0 z-50 bg-navy border-b border-gold border-opacity-20 px-4 py-3">
    <div class="flex items-center justify-between">
        <!-- Left: Hamburger Menu -->
        <div class="flex items-center gap-3">
            <button id="menu-toggle" class="text-gold text-2xl leading-none">☰</button>
            <div class="text-white font-semibold text-sm bg-gradient-to-r from-gold/20 via-gold/30 to-amber-600/20 px-3 py-1 rounded-lg border-l-2 border-gold/50">
                NGO Portal
            </div>
        </div>
        
        <!-- Right: Account Circle -->
        <div class="w-8 h-8 rounded-full bg-gradient-to-r from-teal to-cyan-400 text-deep font-bold flex items-center justify-center text-sm shadow-lg shadow-teal/30">
            {{ user.business_name|first|upper }}
        </div>
    </div>
</div>

<!-- Sidebar -->
<div id="sidebar" class="w-64 bg-navy border-r border-gold border-opacity-20 h-screen p-4 flex flex-col
    fixed top-0 left-0 z-50 -translate-x-full md:translate-x-0 md:shrink-0 md:sticky md:top-0 transition-transform duration-300">

    <!-- Close button (mobile) -->
    <button id="menu-close" class="md:hidden self-end text-gray-400 hover:text-gray-200 hover:scale-110 text-xl mb-2 transition-all duration-200">✕</button>

    <!-- Business info -->
    <div class="mb-6 pb-4 border-b border-gold border-opacity-20 flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-r from-teal to-cyan-400 text-deep font-bold flex items-center justify-center">
                {{ user.business_name|first|upper }}
            </div>
            <div>
                <p class="text-white font-semibold text-sm truncate max-w-[150px]">{{ user.business_name }}</p>
                <p class="text-teal-400 text-xs font-bold">Enterprise M&E</p>
            </div>
        </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 space-y-1 overflow-y-auto">
        <a href="{% url 'ngo_portal:dashboard' %}" class="flex items-center gap-3 px-4 py-2 rounded-lg {% if request.resolver_match.url_name == 'dashboard' %}bg-gold text-deep shadow-lg shadow-gold/30{% else %}text-gray-300 hover:bg-gradient-to-r hover:from-blue-800 hover:to-blue-700 hover:text-gray-100 hover:scale-105 hover:shadow-lg hover:shadow-gray-20{% endif %} transition-all duration-300 ease-out">
            <span class="text-lg">📈</span>
            <span>M&E Dashboard</span>
        </a>

        <a href="{% url 'ngo_portal:beneficiaries' %}" class="flex items-center gap-3 px-4 py-2 rounded-lg {% if request.resolver_match.url_name == 'beneficiaries' %}bg-gold text-deep shadow-lg shadow-gold/30{% else %}text-gray-300 hover:bg-gradient-to-r hover:from-blue-800 hover:to-blue-700 hover:text-gray-100 hover:scale-105 hover:shadow-lg hover:shadow-gray-20{% endif %} transition-all duration-300 ease-out">
            <span class="text-lg">👥</span>
            <span>Beneficiaries</span>
        </a>

        <a href="{% url 'ngo_portal:export_audit' %}" class="flex items-center gap-3 px-4 py-3 mt-4 rounded-lg bg-gradient-to-r from-teal to-cyan-500 text-deep font-bold shadow-lg shadow-teal/30 hover:scale-105 transition-all duration-300 ease-out">
            <span class="text-xl">📊</span>
            <span>Export Donor Audit</span>
        </a>
    </nav>

    <div class="border-t border-gold border-opacity-20 pt-4 space-y-2 flex-shrink-0">
        <a href="{% url 'vendors:profile' %}" class="block px-4 py-2 text-gray-300 hover:text-gray-100 hover:bg-gradient-to-r hover:from-gray-700 hover:to-transparent hover:scale-105 text-sm rounded-lg transition-all duration-300 ease-out">⚙️ Settings</a>
        <a href="{% url 'logout' %}" class="block px-4 py-2 text-gray-300 hover:text-red-400 hover:bg-gradient-to-r hover:from-red-900/50 hover:to-transparent hover:scale-105 text-sm rounded-lg transition-all duration-300 ease-out">🚪 Logout</a>
    </div>
</div>

<!-- Overlay -->
<div id="sidebar-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden"></div>

<!-- Sidebar JS -->
<script>
    const toggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const closeBtn = document.getElementById('menu-close');

    function openMenu() {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    }
    function closeMenu() {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }

    toggle.addEventListener('click', openMenu);
    closeBtn.addEventListener('click', closeMenu);
    overlay.addEventListener('click', closeMenu);

    sidebar.querySelectorAll('nav a').forEach(link => {
        link.addEventListener('click', closeMenu);
    });
</script>
