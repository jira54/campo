<!-- Mobile Top Bar (Boutique) -->
<div class="md:hidden fixed top-0 left-0 right-0 z-[60] bg-deep border-b border-white/5 px-6 py-4 flex items-center justify-between backdrop-blur-xl">
    <div class="flex items-center gap-3">
        <button id="menu-toggle" class="text-white text-2xl leading-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
        </button>
        <span class="text-brand font-outfit font-black text-sm uppercase tracking-widest">NGO Portal</span>
    </div>
    <div class="w-10 h-10 rounded-xl bg-brand flex items-center justify-center text-deep font-black text-xs shadow-brand">
        {{ user.business_name|first|upper }}
    </div>
</div>

<!-- Sidebar (Boutique) -->
<div id="sidebar" class="w-72 bg-deep border-r border-white/5 h-screen flex flex-col fixed top-0 left-0 z-[70] -translate-x-full md:translate-x-0 md:shrink-0 md:sticky md:top-0 transition-all duration-500 ease-in-out">

    <!-- Close button (mobile) -->
    <button id="menu-close" class="md:hidden absolute top-6 right-6 text-stone-500 hover:text-white transition-all">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>

    <!-- Brand Identity -->
    <div class="p-8 pb-10">
        <div class="flex items-center gap-4">
            {% if user.logo_url %}
                <img src="{{ user.logo_url }}" class="w-12 h-12 rounded-xl object-cover border border-white/10">
            {% else %}
                <div class="w-12 h-12 rounded-xl bg-brand flex items-center justify-center text-deep font-outfit font-black text-xl shadow-brand">
                    {{ user.business_name|first|upper }}
                </div>
            {% endif %}
            <div>
                <p class="text-white font-outfit font-black text-lg leading-tight truncate max-w-[140px]">{{ user.business_name }}</p>
                <p class="text-stone-500 text-[10px] font-black uppercase tracking-widest mt-1">Impact Ops</p>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 space-y-2 overflow-y-auto custom-scrollbar">
        <p class="px-4 text-[10px] font-black text-stone-600 uppercase tracking-[0.2em] mb-4">Impact Tracking</p>
        
        <a href="{% url 'ngo_portal:dashboard' %}" class="flex items-center gap-4 px-4 py-4 rounded-2xl transition-all group {% if request.resolver_match.url_name == 'dashboard' %}bg-brand text-deep shadow-brand{% else %}text-stone-400 hover:bg-white/[0.03] hover:text-white{% endif %}">
            <svg class="w-5 h-5 {% if request.resolver_match.url_name == 'dashboard' %}text-deep{% else %}text-brand transition-transform group-hover:scale-110{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            <span class="font-outfit font-bold text-sm tracking-tight">Impact Dashboard</span>
        </a>

        <a href="{% url 'ngo_portal:beneficiaries' %}" class="flex items-center gap-4 px-4 py-4 rounded-2xl transition-all group {% if request.resolver_match.url_name == 'beneficiaries' %}bg-brand text-deep shadow-brand{% else %}text-stone-400 hover:bg-white/[0.03] hover:text-white{% endif %}">
            <svg class="w-5 h-5 {% if request.resolver_match.url_name == 'beneficiaries' %}text-deep{% else %}text-stone-600 group-hover:text-brand transition-colors{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <span class="font-outfit font-bold text-sm tracking-tight">Beneficiaries</span>
        </a>

        <div class="pt-10">
            <a href="{% url 'ngo_portal:export_audit' %}" class="flex items-center gap-4 px-6 py-5 rounded-2xl bg-white text-deep transition-all group shadow-xl hover:scale-[1.02] active:scale-[0.98]">
                <svg class="w-6 h-6 text-deep" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                <span class="font-outfit font-black text-sm uppercase tracking-widest">Export Donor Log</span>
            </a>
        </div>
    </nav>

    <!-- User & Exit -->
    <div class="p-4 border-t border-white/5 space-y-1">
        <a href="{% url 'vendors:profile' %}" class="flex items-center gap-4 px-4 py-4 rounded-2xl text-stone-500 hover:text-white hover:bg-white/[0.02] transition-all group">
            <svg class="w-5 h-5 text-stone-600 group-hover:text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="font-outfit font-bold text-sm">Account Settings</span>
        </a>
        <a href="{% url 'logout' %}" class="flex items-center gap-4 px-4 py-4 rounded-2xl text-stone-500 hover:text-red-400 hover:bg-red-500/5 transition-all group">
            <svg class="w-5 h-5 text-stone-600 group-hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            <span class="font-outfit font-bold text-sm">Logout Platform</span>
        </a>
    </div>
</div>

<!-- Overlay -->
<div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[65] md:hidden transition-opacity"></div>

<script>
    const toggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const closeBtn = document.getElementById('menu-close');

    function openMenu() {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    }
    function closeMenu() {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }

    toggle.addEventListener('click', openMenu);
    closeBtn.addEventListener('click', closeMenu);
    overlay.addEventListener('click', closeMenu);

    sidebar.querySelectorAll('nav a').forEach(link => {
        link.addEventListener('click', closeMenu);
    });
</script>

<style>
.custom-scrollbar::-webkit-scrollbar {
    width: 3px;
}
.custom-scrollbar::-webkit-scrollbar-track {
    background: transparent;
}
.custom-scrollbar::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
}
</style>
