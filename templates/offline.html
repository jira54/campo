{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-6 relative">
    <div class="glass-box premium-border border-brand/20 p-12 rounded-3xl text-center max-w-md w-full relative overflow-hidden group">
        <!-- Visual Accent -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-brand/5 blur-[80px] group-hover:bg-brand/10 transition-all pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-32 h-32 bg-sparkle-blue/5 blur-[80px] group-hover:bg-sparkle-blue/10 transition-all pointer-events-none"></div>

        <div class="relative z-10 space-y-8">
            <div class="w-20 h-20 bg-stone-900 border border-white/5 rounded-2xl flex items-center justify-center mx-auto shadow-2xl border-brand/20">
                <svg class="w-10 h-10 text-brand animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0-12.728L5.636 18.364m12.728 0L10 10m-2 8a2 2 0 110-4 2 2 0 010 4z"/>
                </svg>
            </div>
            
            <div class="space-y-3">
                <h1 class="text-3xl md:text-4xl font-outfit font-black text-white tracking-tight">Core Signal Lost</h1>
                <p class="text-stone-300 text-sm leading-relaxed">
                    The platform is currently unreachable. Please check your data connection or wait for the system to reconnect to our secure nodes.
                </p>
            </div>

            <div class="pt-4">
                <button onclick="window.location.reload()" 
                        class="w-full bg-brand text-deep font-outfit font-black py-4 rounded-2xl shadow-brand hover:scale-[1.02] transition-transform active:scale-[1.0] pointer-events-auto">
                    Try Reconnecting
                </button>
            </div>
            
            <p class="text-[10px] text-stone-500 uppercase tracking-widest font-black">Node Fallback Active</p>
        </div>
    </div>
</div>
{% endblock %}
