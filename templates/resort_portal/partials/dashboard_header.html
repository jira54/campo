<!-- Dashboard Header Component -->
<div class="mb-10 md:mb-14">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 pb-8 border-b border-white/5">
        <div class="space-y-2">
            <div class="flex items-center gap-3 mb-4">
                {% if user.logo_url %}
                    <img src="{{ user.logo_url }}" alt="Logo" class="w-12 h-12 rounded-xl object-cover border border-white/10 shadow-2xl">
                {% else %}
                    <div class="w-12 h-12 rounded-xl bg-brand flex items-center justify-center text-deep font-outfit font-black text-xl shadow-brand">
                        {{ user.business_name|first|upper }}
                    </div>
                {% endif %}
                <div>
                    <h1 class="text-white font-outfit font-black text-2xl md:text-3xl tracking-tight">{{ user.business_name }}</h1>
                    <p class="text-stone-300 text-xs uppercase tracking-[0.2em] font-bold">Resort</p>
                </div>
            </div>
            <h2 class="text-3xl md:text-5xl font-outfit font-black text-white leading-tight">
                Fresh <span class="text-brand">Arrivals</span>.
            </h2>
        </div>
        
        <div class="flex flex-col md:flex-row items-end gap-4">
            <!-- View Toggle -->
            <div class="bg-stone-800 p-1 rounded-xl flex items-center border border-white/5">
                <button onclick="setViewMode('staff')" id="staff-toggle" class="px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all bg-brand text-deep shadow-brand">
                    Staff
                </button>
                <button onclick="setViewMode('manager')" id="manager-toggle" class="px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all text-stone-500 hover:text-white">
                    Manager
                </button>
            </div>

            <button onclick="openRegisterModal()" class="bg-brand text-deep text-[10px] font-black uppercase tracking-[0.2em] px-6 py-4 rounded-xl shadow-brand hover:scale-105 transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                New Check-In
            </button>
        </div>

        <!-- Manager Controls (visible in Manager View) -->
        <div class="manager-content hidden animate-in border-l border-white/10 pl-4 ml-2 flex items-center gap-3">
            <form method="GET" class="flex items-center gap-3">
                <select name="period" onchange="this.form.submit()" class="bg-stone-900/50 border border-white/10 rounded-xl px-4 py-3 text-white text-[10px] font-black uppercase tracking-widest focus:outline-none focus:border-brand">
                    <option value="today" {% if period == 'today' %}selected{% endif %}>Today</option>
                    <option value="week" {% if period == 'week' %}selected{% endif %}>Last 7 Days</option>
                    <option value="month" {% if period == 'month' %}selected{% endif %}>Last 30 Days</option>
                </select>
                
                <a href="{% url 'resort_portal:lock_manager' %}" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 p-3 rounded-xl border border-red-500/20 transition-all flex items-center gap-2 text-[10px] font-black uppercase tracking-widest" title="Lock Dashboard">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    Lock
                </a>
            </form>
        </div>
    </div>
</div>
