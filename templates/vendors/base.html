<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>CampoPawa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root{
        --cp-bg: #f6fbfa;
        --cp-card: #ffffff;
        --cp-primary: #0ea5a4; /* teal-ish */
        --cp-accent: #7c3aed; /* warm purple */
        --cp-cta: #0ea5a4;
        --cp-cta-contrast: #ffffff;
        --cp-muted: #6b7280;
      }
      body{background: linear-gradient(180deg, var(--cp-bg), #f8fdfc);}
      .cp-nav{background: linear-gradient(90deg, rgba(14,165,164,0.07), rgba(124,58,237,0.04)); box-shadow: 0 2px 6px rgba(16,24,40,0.03);}
      .cp-card{background: var(--cp-card); border: 1px solid rgba(16,24,40,0.04); border-radius: .5rem; box-shadow: 0 6px 18px rgba(16,24,40,0.06);}
      .cp-cta{background: linear-gradient(90deg,var(--cp-cta),var(--cp-accent)); color:var(--cp-cta-contrast);}
      .cp-ghost{background:transparent;border:1px solid rgba(16,24,40,0.06);color:var(--cp-muted)}
      .cp-primary-text{color:var(--cp-primary)}
      .cp-muted{color:var(--cp-muted)}
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <nav class="cp-nav">
      <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center sm:justify-between gap-3">
        <a href="/" class="flex items-center gap-3" aria-label="CampoPawa home">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" role="img" aria-label="CampoPawa logo" xmlns="http://www.w3.org/2000/svg">
            <rect width="24" height="24" rx="6" fill="url(#g)" />
            <path d="M7 12h10M12 7v10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="g" x1="0" x2="1">
                <stop offset="0" stop-color="#06b6d4" />
                <stop offset="1" stop-color="#10b981" />
              </linearGradient>
            </defs>
          </svg>
          <span class="font-bold text-lg">CampoPawa</span>
        </a>
        <div class="flex gap-3">
          {% if user.is_authenticated %}
            <a href="{% url 'vendors:dashboard' %}" class="px-3 py-2 cp-cta rounded w-full sm:w-auto">Dashboard</a>
            <a href="{% url 'vendors:customers' %}" class="px-3 py-2 cp-ghost rounded w-full sm:w-auto">Customers</a>
            <a href="{% url 'vendors:loyalty' %}" class="px-3 py-2 cp-ghost rounded w-full sm:w-auto">Loyalty</a>
            <a href="{% url 'vendors:sales' %}" class="px-3 py-2 cp-ghost rounded w-full sm:w-auto">Sales</a>
            <form method="post" action="{% url 'vendors:logout' %}">
              {% csrf_token %}
              <button type="submit" class="px-3 py-2 bg-red-600 text-white rounded">Logout</button>
            </form>
          {% else %}
            <a href="{% url 'vendors:register' %}" class="px-3 py-2 bg-blue-500 text-white rounded w-full sm:w-auto">Register</a>
            <a href="{% url 'vendors:login' %}" class="px-3 py-2 w-full sm:w-auto">Login</a>
          {% endif %}
        </div>
      </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8">
      {% if messages %}
        <div>
          {% for message in messages %}
            <div class="mb-2 p-2 bg-green-100 text-green-800 rounded">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
