{% extends 'base.html' %}

{% block title %}Sign In - CampoPawa{% endblock %}

{% block content %}
<div class="min-h-screen bg-deep flex items-center justify-center p-8">
    <div class="w-full max-w-md">
        <!-- Back to Landing -->
        <a href="{% url 'landing' %}" class="text-gray-400 hover:text-gold text-sm mb-8 inline-block">← Back to CampoPawa</a>

        <!-- Form Card -->
        <div class="bg-navy border border-gold border-opacity-20 rounded-lg p-8">
            <h1 class="text-3xl font-bold text-white mb-2">Sign In</h1>
            <p class="text-gray-400 mb-8">Welcome back to your CampoPawa dashboard</p>

            <!-- Error Message -->
            {% if error %}
                <div class="bg-red-900 bg-opacity-40 border-l-4 border-red-500 p-4 rounded-lg mb-6">
                    <p class="text-red-400">{{ error }}</p>
                </div>
            {% endif %}

            <!-- Form -->
            <form method="post" class="space-y-4">
                {% csrf_token %}

                <!-- Email -->
                <div>
                    <label class="block text-gold font-bold mb-2">Email Address</label>
                    <input 
                        type="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                        class="w-full bg-deep border border-gold border-opacity-30 text-white placeholder-gray-600 px-4 py-2 rounded focus:outline-none focus:border-gold"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-gold font-bold mb-2">Password</label>
                    <div class="relative">
                        <input 
                            id="id_password" 
                            type="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                            class="w-full bg-deep border border-gold border-opacity-30 text-white placeholder-gray-600 px-4 py-2 rounded focus:outline-none focus:border-gold"
                        >
                        <button type="button" id="togglePassword" class="absolute right-2 top-2 text-gray-300" aria-label="Toggle password visibility">Show</button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="w-full bg-gold text-deep font-bold px-4 py-3 rounded hover:bg-yellow-400 transition mt-6">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <hr class="border-gold border-opacity-20 my-6">

            <!-- Sign Up Link -->
            <p class="text-gray-400 text-center">
                Don't have an account? 
                <a href="{% url 'register' %}" class="text-gold hover:text-yellow-300 font-bold">Sign up here</a>
            </p>
        </div>
    </div>
</div>
        <script>
        document.addEventListener('DOMContentLoaded', function(){
            const pwd = document.getElementById('id_password');
            const btn = document.getElementById('togglePassword');
            if (pwd && btn) {
                btn.addEventListener('click', function(){
                    if (pwd.type === 'password') {
                        pwd.type = 'text';
                        btn.textContent = 'Hide';
                    } else {
                        pwd.type = 'password';
                        btn.textContent = 'Show';
                    }
                });
            }
        });
        </script>
{% endblock %}
