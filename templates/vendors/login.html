{% extends 'base.html' %}

{% block title %}Sign In - CampoPawa{% endblock %}

{% block content %}
<div class="min-h-screen bg-deep flex items-center justify-center pt-12 px-4 sm:pt-16 sm:px-6 lg:pt-20 lg:px-8 relative overflow-hidden">
    <!-- Premium Background Effects -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute top-1/4 -left-20 w-80 h-80 bg-brand/5 blur-[100px] rounded-full"></div>
        <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-amber-500/5 blur-[120px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Back to Landing -->
        <a href="{% url 'landing' %}" class="text-stone-500 hover:text-brand hover:scale-105 text-[10px] font-black uppercase tracking-widest mb-8 inline-block transition-all duration-300">&larr; Back to Network</a>

        <!-- Form Card -->
        <div class="glass-box premium-border rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-24 h-24 bg-brand/5 blur-3xl pointer-events-none"></div>
            <h1 class="text-3xl font-black text-white mb-2 font-outfit uppercase tracking-tight">Access Hub</h1>
            <p class="text-stone-500 mb-10 text-xs font-medium">Continue your operational journey.</p>

            <!-- Error Message -->
            {% if error %}
                <div class="bg-red-900 bg-opacity-40 border-l-4 border-red-500 p-4 rounded-lg mb-6">
                    <p class="text-red-400">{{ error }}</p>
                </div>
            {% endif %}

            <!-- Form -->
            <form method="post" action="{% url 'login' %}" class="space-y-4">
                {% csrf_token %}

                <!-- Email -->
                <div>
                    <label class="block text-stone-400 font-bold text-[10px] uppercase tracking-[0.2em] mb-2 font-outfit">Email Address</label>
                    <input 
                        type="email" 
                        name="email" 
                        value="{{ initial_email|default:'' }}"
                        placeholder="your@email.com"
                        required
                        class="w-full bg-black/40 border border-stone-800 text-white placeholder-stone-500 px-4 py-3 rounded-xl focus:outline-none focus:border-gold transition-all"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-stone-400 font-bold text-[10px] uppercase tracking-[0.2em] mb-2 font-outfit">Password</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            name="password" 
                            placeholder="•••••••"
                            required
                            class="w-full bg-black/40 border border-stone-800 text-white placeholder-stone-500 px-4 py-3 rounded-xl focus:outline-none focus:border-gold transition-all"
                        >
                        <button type="button" id="togglePassword" class="absolute right-4 top-3 text-stone-600 hover:text-gold transition-colors font-bold text-xs uppercase tracking-widest" aria-label="Toggle password visibility">Show</button>
                    </div>
                    <p class="text-right mt-2">
                        <a href="{% url 'password_reset' %}" class="text-gold hover:text-yellow-300 text-sm">Forgot your password?</a>
                    </p>
                </div>

                <!-- Submit -->
                <button type="submit" class="w-full bg-gradient-to-r from-gold to-amber-500 text-deep font-black py-4 rounded-xl hover:shadow-xl hover:shadow-gold/20 transition-all font-outfit uppercase tracking-widest mt-8">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <hr class="border-stone-800 my-8">

            <!-- Sign Up Link -->
            <p class="text-stone-400 text-center text-sm">
                Don&apos;t have an account? 
                <a href="{% url 'register' %}" class="text-gold hover:text-yellow-300 font-bold transition-all duration-200">Sign up here</a>
            </p>
        </div>
    </div>
</div>
        <script>
        document.addEventListener('DOMContentLoaded', function(){
            const pwd = document.querySelector('input[name="password"]');
            const btn = document.getElementById('togglePassword');
            if (pwd && btn) {
                btn.addEventListener('click', function(){
                    if (pwd.type === 'password') {
                        pwd.type = 'text';
                        btn.textContent = 'Hide';
                    } else {
                        pwd.type = 'password';
                        btn.textContent = 'Show';
                    }
                });
            }
        });
        </script>
{% endblock %}
