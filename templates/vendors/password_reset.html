{% extends 'base.html' %}

{% block title %}Reset Password — CampoPawa{% endblock %}

{% block content %}
<div class="min-h-screen bg-deep flex items-center justify-center p-6 font-outfit relative overflow-hidden">
    <!-- Background Glow -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[600px] pointer-events-none opacity-20">
        <div class="absolute inset-x-0 -top-40 h-[400px] blur-[120px] bg-brand/30"></div>
    </div>

    <div class="w-full max-w-lg relative z-10">
        <!-- Brand identity -->
        <div class="text-center mb-12">
            <div class="inline-flex w-20 h-20 rounded-2xl bg-brand items-center justify-center text-deep font-black text-3xl shadow-[0_0_30px_rgba(197,160,89,0.4)] mb-8 glow-gold">
                CP
            </div>
            <h1 class="text-white text-4xl md:text-5xl font-black tracking-tight mb-4 uppercase">Security <span class="text-brand">&</span> Access</h1>
            <p class="text-stone-500 font-medium max-w-sm mx-auto">Initiate the secure reset protocol for your MSME or Enterprise account.</p>
        </div>

        <!-- Form Card -->
        <div class="glass-box premium-border rounded-[2.5rem] p-10 md:p-12 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-brand/5 blur-3xl pointer-events-none"></div>
            
            <form method="post" class="space-y-10">
                {% csrf_token %}

                <div class="space-y-3">
                    <label class="block text-[10px] font-black text-stone-500 uppercase tracking-widest pl-2">Operational Email</label>
                    <div class="relative group">
                        <input 
                            type="email" 
                            name="email" 
                            placeholder="your@email.com"
                            required
                            class="w-full bg-stone-900/50 border border-white/10 text-white placeholder-stone-700 px-8 py-5 rounded-2xl focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all text-xl font-bold"
                        >
                        <div class="absolute inset-0 rounded-2xl border border-brand/20 opacity-0 group-focus-within:opacity-100 transition-opacity pointer-events-none"></div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-gold to-amber-500 text-deep font-black py-5 rounded-2xl shadow-brand hover:scale-[1.02] active:scale-[0.98] transition-all text-xl uppercase tracking-tighter">
                    Reset Security Keys
                </button>
            </form>

            <div class="mt-12 pt-8 border-t border-white/5 text-center">
                <p class="text-stone-500 text-sm font-medium">
                    Credentials recovered? 
                    <a href="{% url 'login' %}" class="text-brand hover:text-white transition-colors ml-2 font-black uppercase tracking-widest text-xs underline underline-offset-4">Return to Command</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
