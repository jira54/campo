{% extends 'base.html' %}

{% block title %}Reset Password - CampoPawa{% endblock %}

{% block content %}
<div class="min-h-screen bg-deep flex items-start justify-center pt-12 px-4 sm:pt-16 sm:px-6 lg:pt-20 lg:px-8">
    <div class="w-full max-w-md">
        <!-- Back to Login -->
        <a href="{% url 'login' %}" class="text-gray-400 hover:text-gold text-sm mb-6 inline-block">← Back to Login</a>

        <!-- Form Card -->
        <div class="bg-navy border border-gold border-opacity-20 rounded-lg p-6 sm:p-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2">Reset Password</h1>
            <p class="text-gray-400 mb-6 sm:mb-8">Enter your email address and we'll send you a link to reset your password</p>

            <!-- Form -->
            <form method="post" class="space-y-4">
                {% csrf_token %}

                <!-- Email -->
                <div>
                    <label class="block text-gold font-bold mb-2">Email Address</label>
                    <input 
                        type="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                        class="w-full bg-deep border border-gold border-opacity-30 text-white placeholder-gray-600 px-4 py-2 rounded focus:outline-none focus:border-gold"
                    >
                </div>

                <!-- Submit -->
                <button type="submit" class="w-full bg-gold text-deep font-bold px-4 py-3 rounded hover:bg-yellow-400 transition mt-6">
                    Send Reset Link
                </button>
            </form>

            <!-- Divider -->
            <hr class="border-gold border-opacity-20 my-6">

            <!-- Back to Sign Up Link -->
            <p class="text-gray-400 text-center">
                Remember your password? 
                <a href="{% url 'login' %}" class="text-gold hover:text-yellow-300 font-bold">Sign in here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
