{% extends 'base.html' %}

{% block title %}Password Reset Complete - CampoPawa{% endblock %}

{% block content %}
<div class="min-h-screen bg-deep flex items-center justify-center p-8">
    <div class="w-full max-w-md">
        <!-- Form Card -->
        <div class="bg-navy border border-gold border-opacity-20 rounded-lg p-8 text-center">
            <div class="mb-6">
                <div class="w-16 h-16 bg-green-900 bg-opacity-40 rounded-full flex items-center justify-center mx-auto">
                    <span class="text-3xl">✓</span>
                </div>
            </div>
            
            <h1 class="text-3xl font-bold text-white mb-4">Password Reset Successful</h1>
            <p class="text-gray-400 mb-8">
                Your password has been successfully reset. 
                You can now log in with your new password.
            </p>

            <!-- Sign In Button -->
            <a href="{% url 'login' %}" class="inline-block w-full bg-gold text-deep font-bold px-4 py-3 rounded hover:bg-yellow-400 transition text-center">
                Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}
