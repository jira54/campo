{% extends 'base.html' %}

{% block title %}Profile - CampoPawa{% endblock %}

{% block content %}
<div class="min-h-screen bg-deep flex items-center justify-center p-8">
    <div class="w-full max-w-3xl">
        <a href="{% url 'vendors:dashboard' %}" class="text-gray-400 hover:text-gold text-sm mb-8 inline-block">← Back to Dashboard</a>
        <div class="bg-navy border border-gold border-opacity-20 rounded-lg p-8">
            <h1 class="text-2xl font-bold text-white mb-4">Business Profile</h1>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-gold text-deep font-bold px-6 py-3 rounded hover:bg-yellow-400 transition">Save</button>
                    <a href="{% url 'vendors:dashboard' %}" class="flex-1 bg-navy border border-gold text-gold font-bold px-6 py-3 rounded text-center">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
