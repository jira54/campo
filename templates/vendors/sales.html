{% extends 'vendors/base.html' %}
{% block content %}
  <h2 class="text-2xl font-semibold mb-4">Quick record</h2>
  <div class="mb-4">
    <form method="post" class="mobile-quick px-2" autocomplete="off">
      {% csrf_token %}
      <label for="amount" class="block text-sm font-medium text-gray-700 mb-2">Amount (required)</label>
      <input type="number" id="amount" name="amount" inputmode="decimal" step="0.01" placeholder="e.g. 250" class="w-full p-4 text-xl rounded border mb-3" autofocus>
      
      <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">Customer phone (optional)</label>
      <input type="text" id="phone" name="phone" inputmode="numeric" placeholder="e.g. 0711000000" class="w-full p-2 rounded border mb-3">
      
      <label for="notes" class="block text-sm font-medium text-gray-700 mb-2">Notes (optional)</label>
      <textarea id="notes" name="notes" rows="2" placeholder="e.g. tea, snacks" class="w-full p-2 rounded border mb-3"></textarea>
      
      <div class="mt-4">
        <button type="submit" class="w-full py-4 bg-emerald-600 text-white text-xl rounded">Record sale — tap once</button>
      </div>
    </form>
  </div>

  <div class="cp-card overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50"><tr><th class="p-2">Date</th><th class="p-2">Customer</th><th class="p-2">Amount</th><th class="p-2">Notes</th></tr></thead>
      <tbody>
        {% for s in sales %}
          <tr class="border-t"><td class="p-2">{{ s.date }}</td><td class="p-2">{{ s.customer }}</td><td class="p-2">{{ s.amount }}</td><td class="p-2">{{ s.notes }}</td></tr>
        {% empty %}
          <tr><td class="p-2" colspan="4">No sales yet — record one above in seconds</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
